name: Auto-rerun

# Self-repair: if CI or Release fails, re-run its failed jobs once. Transient
# failures (network, NuGet, runner hiccups) recover automatically; a genuine
# failure surfaces after the single retry (run_attempt guard prevents loops).
on:
  workflow_run:
    workflows: [CI, Release]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 2 }}
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed -R ${{ github.repository }}
